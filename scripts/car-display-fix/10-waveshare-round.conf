# Waveshare 4" round 720x720@78 HDMI panel — kiosk display config
# Native mode forced via DT (force-output on hdmi0@5520000); Xorg auto-selects the
# connector's preferred 720x720@78 mode, so no explicit Modes line is needed here.

Section "ServerFlags"
    Option "BlankTime"   "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime"     "0"
EndSection

Section "Monitor"
    Identifier "HDMI-A-1"
    Option "DPMS" "false"
EndSection

Section "Screen"
    Identifier   "Screen0"
    Monitor      "HDMI-A-1"
    DefaultDepth 24
EndSection
